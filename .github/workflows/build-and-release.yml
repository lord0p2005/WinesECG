name: Build Android APK and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Log in to EAS
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          set -e
          if ! eas whoami >/dev/null 2>&1; then
            eas login --token "$EAS_TOKEN"
          fi

      - name: Run EAS build (Android APK)
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          set -e
          eas build --platform android --profile production --non-interactive --wait --json > build.json
          ARTIFACT_URL=$(jq -r '.artifacts[0].url' build.json)
          echo "Artifact URL: $ARTIFACT_URL"
          curl -L "$ARTIFACT_URL" -o app.apk

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: apk-${{ github.run_id }}
          release_name: APK build ${{ github.run_id }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app.apk
          asset_name: WinesECG.apk
          asset_content_type: application/vnd.android.package-archive
